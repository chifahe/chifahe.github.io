<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>欢迎来到迟法和的个人主页！</title>
        <style>
            * {
                margin: 0%;
                padding: 0%;
            }
            body {
                overflow: hidden;
            }
            #content {
                position: absolute;
                width: 100%;
                height: 100%;
            }
            #toolbar {
                position: absolute;
                width: 98%;
                margin: 1%;
            }
            #switch_language_btn {
                position: absolute;
                right: 0%;
            }
        </style>
    </head>
    <body>
        <iframe id="markdown_container" src="./content.zh-cn.html"></iframe>
        <div id="toolbar">
            <a id="switch_language_btn" href="javascript:switchLanguage()">Switch to English</a>
        </div>
        <script>
            // Objects
            const SWITCH_LANGUAGE_BTN = document.getElementById("switch_language_btn");
            const MARKDOWN_CONTAINER = document.getElementById("markdown_container");

            // Functions
            function switchLanguage() {
                if (SWITCH_LANGUAGE_BTN.innerHTML == "Switch to English") {
                    MARKDOWN_CONTAINER.src = "./content.en-us.html";
                    SWITCH_LANGUAGE_BTN.innerHTML = "切换至中文";
                    document.title = "Welcome to chifahe's homepage!";
                } else {
                    MARKDOWN_CONTAINER.src = "./content.zh-cn.html";
                    SWITCH_LANGUAGE_BTN.innerHTML = "Switch to English";
                    document.title = "欢迎来到迟法和的个人主页！";
                }
            }
        </script>
    </body>
</html>
