<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>欢迎来到迟法和的个人主页！</title>
        <style>
            * {
                margin: 0%;
                padding: 0%;
            }
            body {
                overflow: hidden;
            }
            #content {
                position: absolute;
                width: 100%;
                height: 100%;
            }
            #toolbar {
                position: absolute;
                width: 98%;
                margin: 1%;
            }
            #change_language {
                position: absolute;
                right: 0%;
            }
        </style>
    </head>
    <body>
        <iframe id="content" src="./content.zh_cn.html"></iframe>
        <div id="toolbar">
            <a id="change_language" href="javascript:SwitchLanguage()">Switch to English</a>
        </div>
        <script>
            // Elements that used in script.
            const change_language = document.getElementById("change_language");
            const content = document.getElementById("content");

            function SwitchLanguage() {
                if (change_language.innerHTML == "Switch to English") {
                    content.src = "./content.en_us.html";
                    change_language.innerHTML = "切换至中文";
                    document.title="Welcome to chifahe's homepage!";
                } else {
                    content.src = "./content.zh_cn.html";
                    change_language.innerHTML = "Switch to English";
                    document.title="欢迎来到迟法和的个人主页！";
                }
            }
        </script>
    </body>
</html>
