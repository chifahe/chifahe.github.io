<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>欢迎来到迟法和的个人主页！</title>
        <style>
            * {
                margin: 0%;
                padding: 0%;
            }
            body {
                overflow: hidden;
            }
            #readme {
                position: absolute;
                width: 100%;
                height: 100%;
            }
            #toolbar {
                position: absolute;
                width: 98%;
                margin: 1%;
            }
            #change_language {
                position: absolute;
                right: 0%;
            }
        </style>
    </head>
    <body>
        <iframe id="readme" src="./README.html"></iframe>
        <div id="toolbar">
            <a id="change_language" href="javascript:SwitchLanguage()">Switch to English</a>
        </div>
        <script>
            const change_language = document.getElementById("change_language");

            function SwitchLanguage() {
                readme = document.getElementById("readme");
                if (change_language.innerHTML == "Switch to English") {
                    readme.src = "README_en.html";
                    change_language.innerHTML = "切换至中文";
                } else {
                    readme.src = "README.html";
                    change_language.innerHTML = "Switch to English";
                }
            }
        </script>
    </body>
</html>
